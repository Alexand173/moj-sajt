name: Scrape Reviews & Interviews

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install cheerio @supabase/supabase-js tsx
     - name: Run Scraper
        env:
          # Ovde kažemo: "Uzmi tajnu iz GitHub-a i daj je skripti pod ovim imenom"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npx tsx app/api/scrape-reviews/route.ts