name: News Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          # Instaliramo tsx da robot lakše čita tvoj kod
          npm install -g tsx 

      - name: Run Fetch Script
        run: |
          # Instaliramo tsx privremeno za ovaj korak
          npm install -g tsx
          # Pokrećemo skriptu pomoću tsx
          tsx app/api/fetch-news/route.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}